name: CI

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:web

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=$(curl -sI https://github.com/gitleaks/gitleaks/releases/latest | grep -i location | grep -oE 'v[0-9.]+' | head -1 | sed 's/^v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/
      - name: Scan for secrets
        run: gitleaks detect --source . --log-opts="origin/${{ github.base_ref }}..HEAD" --verbose

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ornn-api image
        run: docker build -t ornn-api-ci -f ornn-api/Dockerfile .
      - name: Build ornn-web image
        run: |
          docker build -t ornn-web-ci \
            --build-arg VITE_API_BASE_URL=https://ci.placeholder.invalid \
            --build-arg VITE_NYXID_AUTHORIZE_URL=https://ci.placeholder.invalid/authorize \
            --build-arg VITE_NYXID_TOKEN_URL=https://ci.placeholder.invalid/token \
            --build-arg VITE_NYXID_CLIENT_ID=ci-placeholder \
            --build-arg VITE_NYXID_REDIRECT_URI=https://ci.placeholder.invalid/callback \
            --build-arg VITE_NYXID_LOGOUT_URL=https://ci.placeholder.invalid/logout \
            -f ornn-web/Dockerfile .
