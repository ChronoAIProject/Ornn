apiVersion: apps/v1
kind: Deployment
metadata:
  name: ornn-api
  namespace: ${NAMESPACE}
  labels:
    app: ornn-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ornn-api
  template:
    metadata:
      labels:
        app: ornn-api
    spec:
      # Audit path downloads skill zips via presigned URLs signed by
      # chrono-storage. Those URLs use `minio.ornn-cluster.local` (the
      # browser-facing hostname) so signatures match whoever GETs them.
      # Resolve that hostname in-cluster so ornn-api can also fetch.
      hostAliases:
        - ip: ${MINIO_HOST_ALIAS_IP}
          hostnames:
            - minio.ornn-cluster.local
      containers:
        - name: ornn-api
          image: ${ORNN_API_IMAGE}
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          ports:
            - containerPort: 3802
          envFrom:
            - configMapRef:
                name: ornn-api-config
            - secretRef:
                name: ornn-api-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3802
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: 3802
            initialDelaySeconds: 20
            periodSeconds: 10
