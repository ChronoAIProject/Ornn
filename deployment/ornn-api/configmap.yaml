apiVersion: v1
kind: ConfigMap
metadata:
  name: ornn-api-config
  namespace: ${NAMESPACE}
data:
  PORT: "${ORNN_API_PORT}"
  LOG_LEVEL: "${ORNN_API_LOG_LEVEL}"
  LOG_PRETTY: "${ORNN_API_LOG_PRETTY}"
  NYXID_JWKS_URL: "${NYXID_JWKS_URL}"
  NYXID_ISSUER: "${NYXID_ISSUER}"
  NYXID_AUDIENCE: "${NYXID_AUDIENCE}"
  NYXID_INTROSPECTION_URL: "${NYXID_INTROSPECTION_URL}"
  NYXID_TOKEN_URL: "${NYXID_TOKEN_URL}"
  NYX_LLM_GATEWAY_URL: "${NYX_LLM_GATEWAY_URL}"
  MONGODB_DB: "${MONGODB_DB}"
  STORAGE_SERVICE_URL: "${STORAGE_SERVICE_URL}"
  STORAGE_BUCKET: "${STORAGE_BUCKET}"
  SANDBOX_SERVICE_URL: "${SANDBOX_SERVICE_URL}"
  DEFAULT_LLM_MODEL: "${DEFAULT_LLM_MODEL}"
  LLM_MAX_OUTPUT_TOKENS: "${LLM_MAX_OUTPUT_TOKENS}"
  LLM_TEMPERATURE: "${LLM_TEMPERATURE}"
  SSE_KEEP_ALIVE_INTERVAL_MS: "${SSE_KEEP_ALIVE_INTERVAL_MS}"
  MAX_PACKAGE_SIZE_BYTES: "${MAX_PACKAGE_SIZE_BYTES}"
