apiVersion: v1
kind: ConfigMap
metadata:
  name: nyxid-backend-config
  namespace: ${NAMESPACE}
data:
  PORT: "${NYXID_PORT}"
  BASE_URL: ${NYXID_BASE_URL}
  FRONTEND_URL: ${NYXID_FRONTEND_URL}
  DATABASE_MAX_CONNECTIONS: "${NYXID_DATABASE_MAX_CONNECTIONS}"
  JWT_PRIVATE_KEY_PATH: ${NYXID_JWT_PRIVATE_KEY_PATH}
  JWT_PUBLIC_KEY_PATH: ${NYXID_JWT_PUBLIC_KEY_PATH}
  JWT_ACCESS_TTL_SECS: "${NYXID_JWT_ACCESS_TTL_SECS}"
  JWT_REFRESH_TTL_SECS: "${NYXID_JWT_REFRESH_TTL_SECS}"
  RATE_LIMIT_PER_SECOND: "${NYXID_RATE_LIMIT_PER_SECOND}"
  RATE_LIMIT_BURST: "${NYXID_RATE_LIMIT_BURST}"
  SMTP_HOST: ${NYXID_SMTP_HOST}
  SMTP_PORT: "${NYXID_SMTP_PORT}"
  SMTP_FROM_ADDRESS: ${NYXID_SMTP_FROM_ADDRESS}
  CORS_ALLOWED_ORIGINS: "${NYXID_CORS_ALLOWED_ORIGINS}"
  RUST_LOG: "${NYXID_RUST_LOG}"
