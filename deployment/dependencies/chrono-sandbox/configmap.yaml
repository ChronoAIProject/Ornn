apiVersion: v1
kind: ConfigMap
metadata:
  name: chrono-sandbox-config
  namespace: ${NAMESPACE}
data:
  # Server
  HOST: "${CHRONO_SANDBOX_HOST}"
  PORT: "${CHRONO_SANDBOX_PORT}"
  RUST_LOG: ${CHRONO_SANDBOX_RUST_LOG}

  # OpenSandbox connection
  OPENSANDBOX_URL: ${CHRONO_SANDBOX_OPENSANDBOX_URL}
  OPENSANDBOX_API_KEY: "${CHRONO_SANDBOX_OPENSANDBOX_API_KEY}"
  OPENSANDBOX_IMAGE: ${CHRONO_SANDBOX_OPENSANDBOX_IMAGE}

  # Timeouts
  SANDBOX_TIMEOUT_SECS: "${CHRONO_SANDBOX_SANDBOX_TIMEOUT_SECS}"
  EXECUTION_TIMEOUT_SECS: "${CHRONO_SANDBOX_EXECUTION_TIMEOUT_SECS}"
  EXECUTION_TIMEOUT_MAX_SECS: "${CHRONO_SANDBOX_EXECUTION_TIMEOUT_MAX_SECS}"
  DEPENDENCY_INSTALL_TIMEOUT_SECS: "${CHRONO_SANDBOX_DEPENDENCY_INSTALL_TIMEOUT_SECS}"

  # Output limits
  MAX_OUTPUT_FILE_SIZE_BYTES: "${CHRONO_SANDBOX_MAX_OUTPUT_FILE_SIZE_BYTES}"
  MAX_OUTPUT_TOTAL_SIZE_BYTES: "${CHRONO_SANDBOX_MAX_OUTPUT_TOTAL_SIZE_BYTES}"
  MAX_DEPENDENCIES: "${CHRONO_SANDBOX_MAX_DEPENDENCIES}"
  MAX_STDOUT_BYTES: "${CHRONO_SANDBOX_MAX_STDOUT_BYTES}"
  MAX_STDERR_BYTES: "${CHRONO_SANDBOX_MAX_STDERR_BYTES}"

  # Sandbox resource defaults/limits
  DEFAULT_CPU: "${CHRONO_SANDBOX_DEFAULT_CPU}"
  DEFAULT_MEMORY: "${CHRONO_SANDBOX_DEFAULT_MEMORY}"
  MAX_CPU_MILLICORES: "${CHRONO_SANDBOX_MAX_CPU_MILLICORES}"
  MAX_MEMORY_MB: "${CHRONO_SANDBOX_MAX_MEMORY_MB}"

  # Session management
  SESSION_TTL_SECS: "${CHRONO_SANDBOX_SESSION_TTL_SECS}"
  SESSION_MAX_TTL_SECS: "${CHRONO_SANDBOX_SESSION_MAX_TTL_SECS}"
  SESSION_CLEANUP_INTERVAL_SECS: "${CHRONO_SANDBOX_SESSION_CLEANUP_INTERVAL_SECS}"
  MAX_SESSIONS: "${CHRONO_SANDBOX_MAX_SESSIONS}"

  # Input files
  MAX_INPUT_FILES: "${CHRONO_SANDBOX_MAX_INPUT_FILES}"
  MAX_INPUT_FILE_SIZE_BYTES: "${CHRONO_SANDBOX_MAX_INPUT_FILE_SIZE_BYTES}"
  MAX_INPUT_TOTAL_SIZE_BYTES: "${CHRONO_SANDBOX_MAX_INPUT_TOTAL_SIZE_BYTES}"
