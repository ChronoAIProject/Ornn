apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrono-storage
  namespace: ${NAMESPACE}
  labels:
    app: chrono-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chrono-storage
  template:
    metadata:
      labels:
        app: chrono-storage
    spec:
      # Make `minio.ornn-cluster.local` resolvable in-cluster so
      # chrono-storage can sign presigned URLs with the same hostname
      # the browser uses. Without this, presigned URLs point to an
      # in-cluster hostname (`minio:9000`) the browser can't reach.
      # The alias target IP comes from the cluster's minio Service
      # ClusterIP at deploy time; update if the service is recreated.
      hostAliases:
        - ip: ${MINIO_HOST_ALIAS_IP}
          hostnames:
            - minio.ornn-cluster.local
      initContainers:
        - name: wait-for-minio
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z minio 9000; do echo "waiting for minio..."; sleep 2; done']
      containers:
        - name: chrono-storage
          image: ${CHRONO_STORAGE_IMAGE}
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          ports:
            - containerPort: 3805
          envFrom:
            - configMapRef:
                name: chrono-storage-config
            - secretRef:
                name: chrono-storage-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3805
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3805
            initialDelaySeconds: 10
            periodSeconds: 10
